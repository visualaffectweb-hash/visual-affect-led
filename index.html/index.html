<!-- ============================================================
     APP BOOTSTRAP
============================================================ -->
<script type="module">
  import { initAuth, login, logout, register, getProfile, isAdmin } from './js/auth.js';
  import { getOnlineStatus } from './js/supabase.js';

  // ── SCREEN MANAGEMENT ──────────────────────────────────────
  window.showScreen = function(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
  };

  // ── NAVIGATION ─────────────────────────────────────────────
  window.navigateTo = async function(section) {
    // Update sidebar active state
    document.querySelectorAll('.sb-item').forEach(item => {
      item.classList.toggle('active', item.dataset.section === section);
    });

    // Show loader
    const mc = document.getElementById('main-content');
    mc.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Loading...</div></div>';

    // Dynamically import and render the correct module
    try {
      const module = await import(`./js/${section}.js`);
      if (module.render) {
        await module.render(mc);
      }
    } catch (err) {
      console.error(`[Nav] Failed to load module: ${section}`, err);
      mc.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Module not loaded yet</div>
        <p>${section}.js is coming in the next build phase.</p>
      </div>`;
    }
  };

  // ── ONLINE/OFFLINE UI ──────────────────────────────────────
  function updateOnlineUI(online) {
    const indicator = document.getElementById('online-indicator');
    const banner = document.getElementById('offline-banner');
    if (indicator) {
      indicator.classList.toggle('online', online);
      indicator.classList.toggle('offline', !online);
      indicator.title = online ? 'Online' : 'Offline';
    }
    if (banner) banner.style.display = online ? 'none' : 'block';
  }

  document.addEventListener('va:online', () => updateOnlineUI(true));
  document.addEventListener('va:offline', () => updateOnlineUI(false));
  updateOnlineUI(navigator.onLine);

  // ── TOAST NOTIFICATIONS ────────────────────────────────────
  window.showToast = function(message, type = 'success', duration = 3500) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('visible'));
    setTimeout(() => {
      toast.classList.remove('visible');
      setTimeout(() => toast.remove(), 300);
    }, duration);
  };

  // ── LOGIN ──────────────────────────────────────────────────
  document.getElementById('btn-login').addEventListener('click', handleLogin);
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      errEl.textContent = 'Please enter your username and password.';
      return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errEl.textContent = '';

    const { error } = await login(email, password);

    if (error) {
      errEl.textContent = error.message || 'Login failed. Please try again.';
      btn.textContent = 'Sign In';
      btn.disabled = false;
      return;
    }

    onSignedIn();
  }

  // ── REGISTER ───────────────────────────────────────────────
  document.getElementById('btn-register').addEventListener('click', handleRegister);

  async function handleRegister() {
    const btn = document.getElementById('btn-register');
    const errEl = document.getElementById('register-error');
    const firstName = document.getElementById('reg-firstname').value.trim();
    const lastName = document.getElementById('reg-lastname').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;

    if (!firstName || !lastName || !email || !password) {
      errEl.textContent = 'Please fill in all required fields.';
      return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;
    errEl.textContent = '';
    errEl.style.color = '';

    const { error } = await register({ firstName, lastName, email, phone, password });

    if (error) {
      errEl.textContent = error.message || 'Registration failed. Please try again.';
      btn.textContent = 'Create Account';
      btn.disabled = false;
      return;
    }

    errEl.style.color = 'var(--color-ok)';
    errEl.textContent = 'Account created! Signing you in...';
    setTimeout(() => onSignedIn(), 1000);
  }

  // ── LOGOUT ─────────────────────────────────────────────────
  window.handleLogout = async function() {
    await logout();
    showScreen('screen-login');
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
  };

  // ── POST-LOGIN SETUP ───────────────────────────────────────
  function onSignedIn() {
    const profile = getProfile();
    if (!profile) return;

    // Set topbar username
    const nameEl = document.getElementById('topbar-username');
    if (nameEl) nameEl.textContent = `${profile.first_name} ${profile.last_name}`.trim() || profile.id;

    // Show admin nav if admin
    if (isAdmin()) {
      document.getElementById('btn-admin-nav').style.display = '';
      document.getElementById('sb-admin').style.display = '';
    }

    showScreen('screen-app');
    navigateTo('leads');
  }

  // ── INIT ───────────────────────────────────────────────────
  async function init() {
    const alreadyLoggedIn = await initAuth();

    if (alreadyLoggedIn) {
      // Small delay to ensure profile is loaded
      setTimeout(onSignedIn, 100);
    } else {
      showScreen('screen-login');
    }

    // Listen for auth events
    document.addEventListener('va:signed-in', () => onSignedIn());
    document.addEventListener('va:signed-out', () => showScreen('screen-login'));
  }

  init();
</script>
